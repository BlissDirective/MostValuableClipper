# =============================================================================
# Fly.io Multi-Region Configuration (Phase 4)
# Deploy to: lax (primary), iad (East Coast), fra (Europe)
#
# Usage:
#   DEPLOYED_REGIONS=lax,iad,fra fly deploy --config fly.multi-region.toml
# =============================================================================
app = "mvc-multiregion"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile.worker"

[env]
  REDIS_URL = "rediss://default:...upstash.io:6379"
  DEPLOYED_REGIONS = "lax,iad,fra"
  DEFAULT_REGION = "lax"

# ---- LAX (Primary) ----
[[vm]]
  size = "performance-2x"
  memory = "2gb"
  cpus = 2
  [[vm.regions]]
    region = "lax"
    count = 4

# ---- IAD (East Coast) ----
[[vm]]
  size = "performance-2x"
  memory = "2gb"
  cpus = 2
  [[vm.regions]]
    region = "iad"
    count = 3

# ---- FRA (Europe) ----
[[vm]]
  size = "performance-2x"
  memory = "2gb"
  cpus = 2
  [[vm.regions]]
    region = "fra"
    count = 2

# Health checks
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health/live"

  [[http_service.checks]]
    interval = "60s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health/ready"

# Metrics
[[metrics]]
  port = 9091
  path = "/metrics"
