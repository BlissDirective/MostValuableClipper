# =============================================================================
# Fly.io Worker Machine Configuration
# Deploy with: fly deploy --config fly.worker.toml
# =============================================================================
app = "mvc-worker"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile.worker"

[env]
  REDIS_URL = "rediss://default:...kv--dbs.deprecated.us-east-1-3.ec2.cloud.redislabs.com:16834"
  CELERY_QUEUES = "pipeline.download,pipeline.transcribe,pipeline.segment,pipeline.generate,pipeline.safety,pipeline.enrich,pipeline.thumbnail,pipeline.upload"
  CELERY_CONCURRENCY = "10"
  WORKER_TYPE = "multi"
  CELERY_LOG_LEVEL = "info"

[[vm]]
  size = "performance-2x"
  memory = "2gb"

# Workers must NOT auto-stop — they process background jobs
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[metrics]]
  port = 9091
  path = "/metrics"
