name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt
    
    - name: Lint with flake8
      run: |
        cd backend
        pip install flake8
        flake8 app/ --max-line-length=120 --exit-zero || true
      continue-on-error: true
    
    - name: Test with pytest
      run: |
        cd backend
        pytest tests/ -v || true
      env:
        APP_ENV: test
        APP_SECRET: test-secret
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      continue-on-error: true
  
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Fly CLI
      uses: superfly/flyctl-actions/setup-flyctl@master
    
    - name: Set Fly.io secrets
      run: |
        cd backend
        flyctl secrets set ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" --app "${{ secrets.FLY_APP_NAME || 'mvc-backend' }}"
        flyctl secrets set SUPABASE_URL="${{ secrets.SUPABASE_URL }}" --app "${{ secrets.FLY_APP_NAME || 'mvc-backend' }}"
        flyctl secrets set SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" --app "${{ secrets.FLY_APP_NAME || 'mvc-backend' }}"
        flyctl secrets set SUPABASE_DIRECT_URL="${{ secrets.SUPABASE_DIRECT_URL }}" --app "${{ secrets.FLY_APP_NAME || 'mvc-backend' }}"
        flyctl secrets set UPSTASH_REDIS_REST_URL="${{ secrets.UPSTASH_REDIS_REST_URL }}" --app "${{ secrets.FLY_APP_NAME || 'mvc-backend' }}"
        flyctl secrets set UPSTASH_REDIS_REST_TOKEN="${{ secrets.UPSTASH_REDIS_REST_TOKEN }}" --app "${{ secrets.FLY_APP_NAME || 'mvc-backend' }}"
        flyctl secrets set CLOUDFLARE_R2_ACCESS_KEY_ID="${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}" --app "${{ secrets.FLY_APP_NAME || 'mvc-backend' }}"
        flyctl secrets set CLOUDFLARE_R2_SECRET_ACCESS_KEY="${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}" --app "${{ secrets.FLY_APP_NAME || 'mvc-backend' }}"
        flyctl secrets set CLOUDFLARE_R2_API_TOKEN="${{ secrets.CLOUDFLARE_R2_API_TOKEN }}" --app "${{ secrets.FLY_APP_NAME || 'mvc-backend' }}"
        flyctl secrets set CLOUDFLARE_ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" --app "${{ secrets.FLY_APP_NAME || 'mvc-backend' }}"
        flyctl secrets set CLOUDFLARE_R2_BUCKET="${{ secrets.CLOUDFLARE_R2_BUCKET || 'mvc-clips' }}" --app "${{ secrets.FLY_APP_NAME || 'mvc-backend' }}"
        flyctl secrets set CLOUDFLARE_R2_ENDPOINT="${{ secrets.CLOUDFLARE_R2_ENDPOINT }}" --app "${{ secrets.FLY_APP_NAME || 'mvc-backend' }}"
        flyctl secrets set STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" --app "${{ secrets.FLY_APP_NAME || 'mvc-backend' }}"
        flyctl secrets set STRIPE_PUBLISHABLE_KEY="${{ secrets.STRIPE_PUBLISHABLE_KEY }}" --app "${{ secrets.FLY_APP_NAME || 'mvc-backend' }}"
        flyctl secrets set STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}" --app "${{ secrets.FLY_APP_NAME || 'mvc-backend' }}"
        flyctl secrets set STRIPE_PRICE_BASIC="${{ secrets.STRIPE_PRICE_BASIC }}" --app "${{ secrets.FLY_APP_NAME || 'mvc-backend' }}"
        flyctl secrets set STRIPE_PRICE_PRO="${{ secrets.STRIPE_PRICE_PRO }}" --app "${{ secrets.FLY_APP_NAME || 'mvc-backend' }}"
        flyctl secrets set STRIPE_PRICE_ENTERPRISE="${{ secrets.STRIPE_PRICE_ENTERPRISE }}" --app "${{ secrets.FLY_APP_NAME || 'mvc-backend' }}"
        flyctl secrets set APP_SECRET="${{ secrets.APP_SECRET }}" --app "${{ secrets.FLY_APP_NAME || 'mvc-backend' }}"
        flyctl secrets set ZERNIO_API_KEY="${{ secrets.ZERNIO_API_KEY }}" --app "${{ secrets.FLY_APP_NAME || 'mvc-backend' }}"
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    
    - name: Deploy to Fly.io
      run: |
        cd backend
        flyctl deploy --remote-only --app "${{ secrets.FLY_APP_NAME || 'mvc-backend' }}"
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}