name: Deploy MVC

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
      - 'db_schema_update.sql'
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
        
      - name: Deploy to Fly.io
        run: flyctl deploy --app mvc-backend --config fly.toml
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  update-database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Apply database schema
        run: |
          curl -s -X POST \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_REF }}/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_MANAGEMENT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(cat db_schema_update.sql | jq -Rs .)}"
        env:
          SUPABASE_MANAGEMENT_TOKEN: ${{ secrets.SUPABASE_MANAGEMENT_TOKEN }}
          SUPABASE_PROJECT_REF: xbftsjerxodfwyqycmjl

  build-frontend:
    runs-on: ubuntu-latest
    needs: [deploy-backend, update-database]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          
      - name: Install dependencies
        run: bun install
        working-directory: frontend
          
      - name: Install EAS CLI
        run: bun add -g eas-cli

      - name: Prebuild check (catch JS bundle errors early)
        run: npx expo export --platform android 2>&1 || true
        working-directory: frontend
        
      - name: Build EAS Update
        run: EXPO_DEBUG=1 eas build --profile preview --platform android --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        working-directory: frontend
        
      - name: Fetch EAS build logs on failure
        if: failure()
        run: |
          echo "=== Fetching latest build logs ==="
          BUILD_JSON=$(eas build:list --platform android --limit 1 --json --non-interactive 2>/dev/null || echo "[]")
          BUILD_ID=$(echo "$BUILD_JSON" | jq -r '.[0].id // empty')
          if [ -n "$BUILD_ID" ]; then
            echo "Build ID: $BUILD_ID"
            echo "Build URL: https://expo.dev/accounts/conradsteinmeyer1s-organization/projects/bliss-clip/builds/$BUILD_ID"
            eas build:logs --id "$BUILD_ID" --non-interactive 2>&1 || echo "Could not fetch logs"
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        working-directory: frontend