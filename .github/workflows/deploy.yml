name: Deploy MVC

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
      - 'db_schema_update.sql'
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
        
      - name: Deploy to Fly.io
        run: flyctl deploy --app mvc-backend --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        working-directory: backend

  update-database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Apply database schema
        run: |
          curl -s -X POST \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_REF }}/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_MANAGEMENT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(cat db_schema_update.sql | jq -Rs .)}"
        env:
          SUPABASE_MANAGEMENT_TOKEN: ${{ secrets.SUPABASE_MANAGEMENT_TOKEN }}
          SUPABASE_PROJECT_REF: xbftsjerxodfwyqycmjl

  build-frontend:
    runs-on: ubuntu-latest
    needs: [deploy-backend, update-database]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install EAS CLI
        run: npm install -g eas-cli
        
      - name: Build EAS Update
        run: eas build --profile preview --platform all --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
